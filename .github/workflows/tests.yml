name: Tests

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
      - release-*
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      COUCHBASE_PHP_EXTENSION_VERSION: "4.5.0"

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        server: ['7.6.3', '8.0.0']

    name: PHP ${{ matrix.php }} - Couchbase ${{ matrix.server }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: json, mbstring, openssl, pcre, pdo, tokenizer, xml, zip
        coverage: xdebug
        tools: composer:v2

    - name: Install Couchbase PHP extension
      run: |
        sudo apt-get update
        sudo apt-get install -y libcouchbase-dev build-essential cmake g++ pkg-config
        pecl install couchbase-${{ env.COUCHBASE_PHP_EXTENSION_VERSION }}
        echo "extension=couchbase.so" | sudo tee -a $(php --ini | grep "Loaded Configuration" | cut -d: -f2 | tr -d ' ')

    - name: Get composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest --no-interaction

    - name: Install cbdinocluster
      run: |
        mkdir -p "$HOME/bin"
        curl -L -o "$HOME/bin/cbdinocluster" https://github.com/couchbaselabs/cbdinocluster/releases/download/v0.0.113/cbdinocluster-linux-amd64
        chmod a+x "$HOME/bin/cbdinocluster"
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize cbdinocluster
      run: |
        cbdinocluster -v init --auto

    - name: Start couchbase cluster
      env:
        CLUSTERCONFIG: |
          nodes:
            - count: 1
              version: ${{ matrix.server }}
              services:
                - kv
            - count: 1
              version: ${{ matrix.server }}
              services:
                - kv
                - n1ql
                - index
            - count: 1
              version: ${{ matrix.server }}
              services:
                - kv
                - fts
                - cbas
          docker:
            kv-memory: 1600
            fts-memory: 2000
      run: |
        CLUSTER_ID=$(cbdinocluster -v allocate --def="${CLUSTERCONFIG}")
        CONNECTION_STRING=$(cbdinocluster -v connstr "${CLUSTER_ID}")
        cbdinocluster -v buckets add ${CLUSTER_ID} default --ram-quota-mb=100 --flush-enabled=true --num-replicas=1
        cbdinocluster -v buckets load-sample ${CLUSTER_ID} travel-sample
        echo "CLUSTER_ID=${CLUSTER_ID}" >> "$GITHUB_ENV"
        echo "TEST_CONNECTION_STRING=${CONNECTION_STRING}?dump_configuration=true" >> "$GITHUB_ENV"

    - name: Run PHPUnit tests
      run: vendor/bin/phpunit --testsuite=integration --coverage-clover=coverage.xml
      env:
        TEST_BUCKET: "default"
        TEST_USERNAME: "Administrator"
        TEST_PASSWORD: "password"
        TEST_SERVER_VERSION: ${{ matrix.server }}

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.php == '8.3' && matrix.server == '8.0.0'
      with:
        file: ./coverage.xml
        flags: integration
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    env:
      COUCHBASE_PHP_EXTENSION_VERSION: "4.5.0"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: json, mbstring, openssl, pcre, pdo, tokenizer, xml, zip
        tools: composer:v2, cs2pr

    - name: Install Couchbase PHP extension
      run: |
        sudo apt-get update
        sudo apt-get install -y libcouchbase-dev build-essential cmake g++ pkg-config
        pecl install couchbase-${{ env.COUCHBASE_PHP_EXTENSION_VERSION }}
        echo "extension=couchbase.so" | sudo tee -a $(php --ini | grep "Loaded Configuration" | cut -d: -f2 | tr -d ' ')

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Check PHP syntax
      run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

    - name: Run PHP CS Fixer (dry-run)
      run: |
        composer global require friendsofphp/php-cs-fixer
        ~/.composer/vendor/bin/php-cs-fixer fix --dry-run --diff --verbose
      continue-on-error: true
